<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YaMusicRPC — Авторизация</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: repeating-linear-gradient(135deg, #1a1a1a, #1a1a1a 20px, #2a2a2a 20px, #2a2a2a 40px);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 40px;
      max-width: 460px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 30px rgba(0,0,0,0.4);
      animation: fadeIn 0.5s ease-out;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
    h1 { font-size: 1.6em; color: #2e74d3; margin-bottom: 6px; }
    .subtitle { color: #666; font-size: 0.9em; margin-bottom: 32px; }
    .step { margin-bottom: 24px; }
    .step-label { font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 8px; }
    .code {
      font-size: 2.2em;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: #222;
      background: #f0f0f0;
      border-radius: 8px;
      padding: 12px 24px;
      display: inline-block;
    }
    .link-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #fc0;
      color: #111;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
    }
    .link-btn:hover { background: #f0be00; }
    .status {
      margin-top: 28px;
      font-size: 0.9em;
      color: #999;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .loader {
      width: 16px; height: 16px;
      border: 2px solid #ddd;
      border-top-color: #2e74d3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status.success { color: #28a745; }
    .status.success .loader { border: 2px solid #28a745; animation: none; }
    .status.expired  { color: #dc3545; }
    .status.expired  .loader { border: 2px solid #dc3545; animation: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>YaMusicRPC</h1>
    <p class="subtitle">Авторизация через Яндекс</p>

    <div class="step">
      <div class="step-label">1. Перейдите по ссылке</div>
      <a class="link-btn" href="{{ verification_url }}" target="_blank">Открыть страницу Яндекса</a>
    </div>

    <div class="step">
      <div class="step-label">2. Введите код</div>
      <div class="code">{{ user_code }}</div>
    </div>

    <div class="status" id="status">
      <div class="loader"></div>
      <span>Ожидание подтверждения...</span>
    </div>
  </div>

  <script>
    function poll() {
      fetch('/status')
        .then(r => r.json())
        .then(data => {
          const el = document.getElementById('status');
          if (data.status === 'success') {
            el.className = 'status success';
            el.innerHTML = '<div class="loader"></div><span>Авторизация успешна! Можно закрыть страницу.</span>';
            setTimeout(() => window.close(), 2000);
          } else if (data.status === 'expired') {
            el.className = 'status expired';
            el.innerHTML = '<div class="loader"></div><span>Время истекло. Попробуйте ещё раз.</span>';
          } else {
            setTimeout(poll, 1500);
          }
        })
        .catch(() => setTimeout(poll, 1500));
    }
    poll();
  </script>
</body>
</html>
